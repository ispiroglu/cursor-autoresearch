name: Bug report
description: Report incorrect behavior or a crash
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill this out.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Short summary of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands, MCP calls, or UI steps. Include OS and editor (Cursor vs VS Code) if relevant.
      placeholder: |
        1. …
        2. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: version
    attributes:
      label: Version / commit
      description: Extension version, or `git rev-parse HEAD` if you run from source.
    validations:
      required: false
